coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 1%
        if_not_found: success
    patch:
      default:
        target: 90%
        threshold: 0%
        if_not_found: success

comment:
  layout: 'reach,diff,flags,tree'
  behavior: default
  require_changes: false

ignore:
  - 'force-app/main/default/classes/**/*_Test.cls'
