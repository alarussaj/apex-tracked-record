name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create unlocked package version & GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Authenticate to Dev Hub
        env:
          SF_DEVHUB_AUTH_URL: ${{ secrets.SF_DEVHUB_AUTH_URL }}
        shell: bash
        run: |
          set -e
          if [ -z "$SF_DEVHUB_AUTH_URL" ]; then
            echo "::error::SF_DEVHUB_AUTH_URL secret is not set. See CONTRIBUTING.md for setup."
            exit 1
          fi
          printf '%s' "$SF_DEVHUB_AUTH_URL" > /tmp/devhub-auth.txt
          sf org login sfdx-url --sfdx-url-file /tmp/devhub-auth.txt --alias DevHub --set-default-dev-hub
          rm /tmp/devhub-auth.txt

      - name: Extract version from tag
        id: version
        run: |
          # Strip the leading 'v' from the tag (v0.1.0 -> 0.1.0)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Create package version
        id: package
        run: |
          set -eo pipefail

          echo "::group::Running sf package version create"

          # Capture stdout and stderr separately
          if sf package version create \
            --package apex-tracked-record \
            --installation-key-bypass \
            --wait 30 \
            --code-coverage \
            --json > /tmp/sf-stdout.json 2> /tmp/sf-stderr.log; then
            SF_EXIT_CODE=0
          else
            SF_EXIT_CODE=$?
          fi

          echo "::endgroup::"

          # Always print captured output for diagnostics
          echo "::group::sf stdout"
          cat /tmp/sf-stdout.json
          echo "::endgroup::"

          if [ -s /tmp/sf-stderr.log ]; then
            echo "::group::sf stderr"
            cat /tmp/sf-stderr.log
            echo "::endgroup::"
          fi

          # Fail if sf failed
          if [ "$SF_EXIT_CODE" -ne 0 ]; then
            echo "::error::sf package version create exited with code $SF_EXIT_CODE"
            exit "$SF_EXIT_CODE"
          fi

          # Extract the package version Id. The raw stdout/stderr were already
          # printed above for diagnostics, so we only need to surface jq's own
          # error here if parsing fails.
          if PACKAGE_VERSION_ID=$(jq -r '.result.SubscriberPackageVersionId // empty' /tmp/sf-stdout.json 2>/tmp/jq-stderr.log); then
            if [ -z "$PACKAGE_VERSION_ID" ]; then
              echo "::error::sf succeeded but no SubscriberPackageVersionId in output"
              exit 1
            fi
          else
            echo "::error::Failed to parse sf output as JSON. jq stderr:"
            cat /tmp/jq-stderr.log
            exit 1
          fi

          echo "package_version_id=$PACKAGE_VERSION_ID" >> $GITHUB_OUTPUT
          echo "::notice::Package Version Id: $PACKAGE_VERSION_ID"

      - name: Promote package version
        run: |
          sf package version promote \
            --package "${{ steps.package.outputs.package_version_id }}" \
            --no-prompt

      - name: Generate release notes
        id: release_notes
        uses: release-drafter/release-drafter@v6
        with:
          version: ${{ steps.version.outputs.version }}
          tag: ${{ github.ref_name }}
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ${{ steps.release_notes.outputs.body }}

            ---

            ### Install URL

            **Production / Developer Edition:**
            ```
            https://login.salesforce.com/packaging/installPackage.apexp?p0=${{ steps.package.outputs.package_version_id }}
            ```

            **Sandbox:**
            ```
            https://test.salesforce.com/packaging/installPackage.apexp?p0=${{ steps.package.outputs.package_version_id }}
            ```

            ### SFDX Install

            ```bash
            sf package install --package ${{ steps.package.outputs.package_version_id }} --target-org <your-org-alias> --wait 10
            ```
          draft: false
          prerelease: ${{ startsWith(steps.version.outputs.version, '0.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
