apex:
  - changed-files:
      - any-glob-to-any-file: 'force-app/**'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/workflows/**'
      - any-glob-to-any-file: '.github/dependabot.yml'
      - any-glob-to-any-file: 'ruleset.xml'
      - any-glob-to-any-file: 'codecov.yml'

documentation:
  - changed-files:
      - any-glob-to-any-file: 'README.md'
      - any-glob-to-any-file: 'docs/**'
      - any-glob-to-any-file: 'CHANGELOG.md'
      - any-glob-to-any-file: 'CONTRIBUTING.md'

config:
  - changed-files:
      - any-glob-to-any-file: 'package.json'
      - any-glob-to-any-file: 'package-lock.json'
      - any-glob-to-any-file: 'sfdx-project.json'
      - any-glob-to-any-file: '.prettierrc'
      - any-glob-to-any-file: '.gitignore'
      - any-glob-to-any-file: '.forceignore'

tests:
  - changed-files:
      - any-glob-to-any-file: 'force-app/main/default/classes/*_Test.cls'
